    - generic [ref=e48]:
      - paragraph [ref=e49]: You can feel better after a talk with a close friend or relative when dealing with moderate or severe emotional distress. However, this relief is often temporary. Talking with a trained professional helps alleviate emotional distress. Applying proven Biblical Principles brings about lasting change that is undeniable. We want to help you move forward in your God given purpose.
      - paragraph [ref=e50]: Our therapists are trained professionals who operate from a Biblical world view. We use Re-decision Therapy, EMDR, TRET (Trauma Resolution Energy Therapy), CBT-TF, and other techniques to treat our clients with the appropriate modality. We care about people and want to help you realize the grace of God in your own life. Each therapist has their own niche and has a track record of helping many people navigate through difficult circumstances to find the peace that only God can give. Your emotional health affects your spiritual life, finances, relationships, and career. Make your emotional health a priority and start the healing process today.
