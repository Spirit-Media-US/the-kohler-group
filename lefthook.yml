# Lefthook git hooks configuration
# Docs: https://github.com/evilmartians/lefthook

# NOTE: `astro check` (TypeScript diagnostics) takes 30s+ and is intentionally
# omitted here. Run it manually before deploying: bun run astro check

pre-commit:
  commands:
    behind-remote:
      run: |
        git fetch --quiet
        LOCAL=$(git rev-parse @)
        REMOTE=$(git rev-parse @{u} 2>/dev/null || echo "")
        if [ -n "$REMOTE" ] && [ "$LOCAL" != "$REMOTE" ]; then
          BASE=$(git merge-base @ @{u})
          if [ "$LOCAL" = "$BASE" ]; then
            echo "❌ BLOCKED: Your branch is behind the remote. Run 'git pull' before committing."
            echo "   This prevents overwriting work from other sessions."
            exit 1
          fi
        fi
    biome:
      glob: "*.{js,ts,jsx,tsx,json,css,astro}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
