[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Branch preview deployments — full build, no www redirect
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# Redirect www to non-www
[[redirects]]
  from = "https://www.thekohlergroup.net/*"
  to = "https://thekohlergroup.net/:splat"
  status = 301
  force = true

# Old site URL redirects (Google still indexes these)
[[redirects]]
  from = "/marriage-intensives"
  to = "/intensives/marriage/"
  status = 301

[[redirects]]
  from = "/marriage-intensives/"
  to = "/intensives/marriage/"
  status = 301

[[redirects]]
