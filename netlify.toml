[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"
  PUBLIC_SITE_URL = "https://thekohlergroup.net"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Branch preview deployments — full build, no www redirect
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# Redirect www to non-www
[[redirects]]
  from = "https://www.thekohlergroup.net/*"
  to = "https://thekohlergroup.net/:splat"
  status = 301
  force = true

# Old site URL redirects (Google still indexes these)
[[redirects]]
  from = "/marriage-intensives"
  to = "/intensives/marriage/"
  status = 301

[[redirects]]
  from = "/marriage-intensives/"
  to = "/intensives/marriage/"
  status = 301

[[redirects]]
  from = "/therapists/april-morris"
  to = "/our-therapists/april-morris/"
  status = 301

[[redirects]]
  from = "/therapists/*"
  to = "/our-therapists/"
  status = 301

[[redirects]]
  from = "/media"
  to = "/education/media/"
  status = 301

[[redirects]]
  from = "/media/"
  to = "/education/media/"
  status = 301

[[redirects]]
  from = "/surviving-trauma"
  to = "/education/surviving-trauma/"
  status = 301

[[redirects]]
  from = "/surviving-trauma/"
  to = "/education/surviving-trauma/"
  status = 301

[[redirects]]
  from = "/therapist-services"
  to = "/our-therapists/"
  status = 301

[[redirects]]
  from = "/therapist-services/"
  to = "/our-therapists/"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://cdn.sanity.io data:; media-src 'self' https://pub-d77219c850804c8ca2ddc9c193465856.r2.dev; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://pub-d77219c850804c8ca2ddc9c193465856.r2.dev https://static.cloudflareinsights.com; frame-src https://barbara-kohler.clientsecure.me https://www.youtube.com; base-uri 'self'; form-action 'self'"
